name: zsv_on_macos_fuzz

on:
  push:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: liquidaty/zsv
        ref: underflow-fix-v2

    - name: Install deps
      run: |
        brew update
        brew install coreutils tree afl++

    - name: Config system for afl
      run: sudo afl-system-config

    - name: Run fuzzing
      run: |
        cd fuzz
        make afl-run-parallel JOBS=4 STOP_ON_CRASH=1 TIMEOUT_SECONDS=3600

    - name: Collect afl crashes
      if: failure()
      id: crashes
      run: |
        cd fuzz
        make afl-list-crashes | tee -a "$GITHUB_STEP_SUMMARY"
        {
          echo "CRASH_FILES<<EOF
          $(make afl-list-crashes)
          echo "EOF"
        } >>"$GITHUB_OUTPUT"

    - name: Upload artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: afl-crashes-${{ matrix.os }}
        path: |
          ${{ steps.crashes.outputs.CRASH_FILES }}

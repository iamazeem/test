name: zsv_on_macos_fuzz

on:
  push:
  workflow_dispatch:

jobs:
  ci:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: liquidaty/zsv
        ref: underflow-fix-v2

    - name: Install deps
      run: |
        brew install coreutils afl++

    - name: Configure macOS Shared Memory for AFL++
      run: |
        echo "=== Before configuration ==="
        sysctl kern.sysv.shmmax kern.sysv.shmall
        
        # Apply the required shared memory updates
        sudo sysctl -w kern.sysv.shmmax=67108864
        sudo sysctl -w kern.sysv.shmall=16384
        
        echo "=== After configuration ==="
        sysctl kern.sysv.shmmax kern.sysv.shmall

    - name: Run fuzzing
      env:
        AFL_DEBUG: 1
      run: |
        cd fuzz
        mkdir -p afl/optimized
        # make afl-build
        sed 's/__ZSV_EXTRAS__DEFINE__//' < ../include/zsv.h.in > ../include/zsv.h
        afl-clang-fast -g3 -O2 -march=native -fsigned-char -DZSV_VERSION=\"fuzz\" -DNDEBUG -DNO_UTF8_CHECK -DHAVE_MEMMEM -DHAVE___BUILTIN_EXPECT -I ../include fuzz.c -o ./afl/fuzz
        echo "=== Running afl-fuzz with 2tsv-2.csv ==="
        ./afl/fuzz < ./afl/corpus/filtered/2tsv-2.csv
        echo "=== Running afl-cmin ==="
        afl-cmin -e -i ../data/test -o ./afl/optimized -T "all" -- ./afl/fuzz || true
        echo "=== Running afl-cmin.bash ==="
        afl-cmin.bash -e -i ../data/test -o ./afl/optimized -T "all" -- ./afl/fuzz || true
        # echo "=== Running afl-fuzz ==="
        # echo "=== Running afl-showmap ==="
        # afl-showmap -o /dev/null -- ./afl/fuzz < ./afl/corpus/filtered/2tsv-2.csv

name: zsv_on_macos_fuzz

on:
  push:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: liquidaty/zsv
        ref: underflow-fix-v2

    - name: Install deps
      run: |
        brew update
        brew install coreutils tree afl++

    - name: config
      run: sudo afl-system-config

    - name: Run fuzzing
      env:
        AFL_DEBUG: 1
      run: |
        cd fuzz
        make afl-run


name: zsv_on_macos_fuzz

on:
  push:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: liquidaty/zsv
        ref: underflow-fix-v2

    - name: Install deps
      run: |
        brew update
        brew install coreutils afl++

    - name: Run fuzzing
      env:
        AFL_DEBUG: 1
      run: |
        sudo afl-system-config

        cd fuzz
        make afl-build

        mkdir -p afl/{filtered,optimized}
        cp ../data/test/2tsv-2.csv afl/filtered/

        echo
        echo "=== Running afl-cmin.bash ==="
        afl-cmin.bash -e -i ./afl/filtered/ -o ./afl/optimized -- ./afl/fuzz && echo "[SUCCESS]" || echo "[FAILURE]"

        ls -l ./afl/{filtered,optimized}

        # echo "=== afl-run ==="
        # make afl-run

        # echo "=== Running afl-fuzz ==="
        # mkdir -p afl/out
        # afl-fuzz -u -i ../data/test -x csv.dict -o ./afl/out -- ./afl/fuzz
